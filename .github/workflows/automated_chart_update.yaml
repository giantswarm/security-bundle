name: Handle Chart Update

on:
  repository_dispatch:
    types: [update-chart]
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repository (e.g. giantswarm/kyverno-app)"
        required: true
        type: string
      sha:
        description: "Head commit SHA from the source repository"
        required: true
        type: string

jobs:
  update_chart:
    name: Update chart reference
    runs-on: ubuntu-24.04
    steps:
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.HERALD_APP_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config --local user.email "149080493+heraldbot[bot]@users.noreply.github.com"
          git config --local user.name "HeraldBot[bot]"

      - name: Derive app name and values.yaml key from repo
        id: app_info
        env:
          REPO: ${{ github.event.client_payload.repo || inputs.repo }}
          SHA: ${{ github.event.client_payload.sha || inputs.sha }}
        run: |
          # Strip giantswarm/ prefix and -app suffix
          # e.g. giantswarm/kyverno-app -> kyverno
          app_name=$(echo "${REPO}" | sed 's|giantswarm/||' | sed 's|-app$||')

          # Validate: only lowercase letters, digits, hyphens — no injection possible
          if ! [[ "${app_name}" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "Invalid app name '${app_name}': must match ^[a-z][a-z0-9-]*$"
            exit 1
          fi

          # Validate SHA is a 40-character hex string
          if ! [[ "${SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid SHA '${SHA}': must be a 40-character lowercase hex string"
            exit 1
          fi

          sha_short="${SHA:0:7}"

          # Convert hyphen-case to camelCase for values.yaml key lookup
          # e.g. kyverno-crds -> kyvernoCrds, cloudnative-pg -> cloudnativePG
          app_key=$(echo "${app_name}" | sed -r 's/-([a-z])/\U\1/g' | sed 's/Pg$/PG/')

          echo "app_name=${app_name}" >> $GITHUB_OUTPUT
          echo "app_key=${app_key}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "sha_short=${sha_short}" >> $GITHUB_OUTPUT

      - name: Fetch source PR URL
        id: source_pr
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          REPO: ${{ github.event.client_payload.repo || inputs.repo }}
          SHA: ${{ steps.app_info.outputs.sha }}
        run: |
          pr_url=$(gh api "repos/${REPO}/commits/${SHA}/pulls" \
            --jq '.[0].html_url // ""' 2>/dev/null || echo "")
          echo "url=${pr_url}" >> $GITHUB_OUTPUT

      - name: Create or reuse update branch
        id: create_branch
        run: |
          branch="automated-chart-updates"

          git fetch origin

          if [ -z "$(git rev-parse --verify origin/${branch} 2>/dev/null)" ]; then
            git checkout -b "${branch}"
          else
            git checkout "${branch}"
            git pull origin "${branch}"
          fi

          echo "branch=${branch}" >> $GITHUB_OUTPUT

      - name: Resolve chart version from catalog entries
        id: resolve_version
        env:
          APP_KEY: ${{ steps.app_info.outputs.app_key }}
          APP_NAME: ${{ steps.app_info.outputs.app_name }}
          SHA: ${{ steps.app_info.outputs.sha }}
        run: |
          values_file="helm/security-bundle/values.yaml"

          # Allowlist check: confirm app_key is a key that actually exists in values.yaml
          # This prevents any unsanitised value from reaching the yq expression
          valid_keys=$(yq e '.apps | keys | .[]' "${values_file}")
          if ! echo "${valid_keys}" | grep -qx "${APP_KEY}"; then
            echo "App '${APP_NAME}' (key: '${APP_KEY}') not found in values.yaml"
            exit 1
          fi

          chart_name=$(yq e ".apps.${APP_KEY}.chartName" "${values_file}")
          current_catalog=$(yq e ".apps.${APP_KEY}.catalog" "${values_file}")

          # Derive the test catalog repo from the app's catalog field
          # e.g. giantswarm -> giantswarm-test-catalog
          base_catalog=$(echo "${current_catalog}" | sed 's/-test$//')
          catalog_repo="${base_catalog}-test-catalog"
          index_url="https://raw.githubusercontent.com/giantswarm/${catalog_repo}/master/index.yaml"

          fetch_index() {
            curl -sfL "${index_url}" -o /tmp/index.yaml
          }

          lookup_sha() {
            CHART="${chart_name}" SHA="${SHA}" yq e \
              '.entries[env(CHART)] // [] | .[] | select(.version | test("-" + env(SHA) + "$")) | .version' \
              /tmp/index.yaml | head -n1
          }

          fetch_index
          new_version=$(lookup_sha)

          for i in 1 2 3 4 5; do
            if [ -n "${new_version}" ]; then
              break
            fi
            echo "SHA ${SHA} not found in ${catalog_repo}, waiting 1 minute before retry ${i}/5..."
            sleep 60
            fetch_index
            new_version=$(lookup_sha)
          done

          if [ -z "${new_version}" ]; then
            echo "SHA still not found, falling back to latest version in ${catalog_repo}"
            latest=$(CHART="${chart_name}" yq e \
              '.entries[env(CHART)] // [] | sort_by(.created) | reverse | .[0].version // ""' \
              /tmp/index.yaml)
            if [ -n "${latest}" ]; then
              base_version=$(echo "${latest}" | sed -E 's/-[0-9a-f]{40}$//')
              new_version="${base_version}-${SHA}"
            fi
          fi

          if [ -z "${new_version}" ]; then
            echo "No versions found for chart '${chart_name}' in ${catalog_repo}"
            exit 1
          fi

          echo "Resolved version: ${new_version}"
          echo "new_version=${new_version}" >> $GITHUB_OUTPUT

      - name: Update version and catalog in values.yaml
        id: update_values
        env:
          APP_KEY: ${{ steps.app_info.outputs.app_key }}
          NEW_VERSION: ${{ steps.resolve_version.outputs.new_version }}
        run: |
          values_file="helm/security-bundle/values.yaml"

          current_catalog=$(yq e ".apps.${APP_KEY}.catalog" "${values_file}")

          # Append -test to the catalog, stripping any existing -test suffix first
          # e.g. giantswarm -> giantswarm-test (idempotent on re-runs)
          base_catalog=$(echo "${current_catalog}" | sed 's/-test$//')
          new_catalog="${base_catalog}-test"

          # Update version and catalog in one pass
          yq e ".apps.${APP_KEY}.version = \"${NEW_VERSION}\" | .apps.${APP_KEY}.catalog = \"${new_catalog}\"" \
            -i "${values_file}"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          BRANCH: ${{ steps.create_branch.outputs.branch }}
          REPOSITORY: ${{ github.repository }}
          APP_NAME: ${{ steps.app_info.outputs.app_name }}
          SHA_SHORT: ${{ steps.app_info.outputs.sha_short }}
        run: |
          git add helm/security-bundle/values.yaml
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Update ${APP_NAME} to ${SHA_SHORT}"
          fi
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"
          git push origin HEAD:"${BRANCH}"

      - name: Create or update PR
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          APP_NAME: ${{ steps.app_info.outputs.app_name }}
          NEW_VERSION: ${{ steps.resolve_version.outputs.new_version }}
          BRANCH: ${{ steps.create_branch.outputs.branch }}
          SOURCE_PR_URL: ${{ steps.source_pr.outputs.url }}
        run: |
          # Fetch existing PR body if PR already exists (write to file to avoid quoting issues)
          pr_number=$(gh pr list --head "${BRANCH}" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "${pr_number}" ] && [ "${pr_number}" != "null" ]; then
            gh pr view "${pr_number}" --json body --jq '.body' > /tmp/existing_body.txt
          else
            touch /tmp/existing_body.txt
          fi

          # Run the script to update the PR body
          git show origin/main:hack/update_pr_body.py > /tmp/update_pr_body.py
          python3 /tmp/update_pr_body.py < /tmp/existing_body.txt > /tmp/pr_body.txt

          # Create PR or update the body of the existing one
          if [ -n "${pr_number}" ] && [ "${pr_number}" != "null" ]; then
            gh pr edit "${pr_number}" --body-file /tmp/pr_body.txt
          else
            gh pr create \
              --title "[DO NOT MERGE] Update apps testing versions" \
              --body-file /tmp/pr_body.txt \
              --head "${BRANCH}" \
              --base main
          fi
