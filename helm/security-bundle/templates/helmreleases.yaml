{{- range $key, $value := .Values.apps }}
{{- $appName := include "app.name" (dict "app" .appName "cluster" $.Values.clusterID "ns" $.Release.Namespace) }}
{{- if .enabled }}
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}
  namespace: {{ $.Release.Namespace }}
spec:
  url: oci://gsoci.azurecr.io/charts/giantswarm/{{ .chartName }}
  ref:
    tag: "{{ .version }}"
  interval: 24h
  timeout: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}
  namespace: {{ $.Release.Namespace }}
spec:
  releaseName: {{ .appName }}
  {{- $appNamespace := required "A valid .Values.global.namespace or .Values.apps.{APP_NAME}.namespace entry is required" (default ($.Values.global).namespace .namespace) }}
  targetNamespace: {{ $appNamespace }}
  storageNamespace: {{ $appNamespace }}
  chartRef:
    kind: OCIRepository
    name: {{ $appName }}
  {{- if .dependsOn }}
  dependsOn:
  {{- range $_, $dependency := .dependsOn }}
  - name: {{ $.Values.clusterID }}-{{ $dependency }}
    namespace: {{ $.Release.Namespace }}
  {{- end }}
  {{- end }}
  kubeConfig:
    secretRef:
      name: {{ $.Values.clusterID }}-kubeconfig
  interval: 5m
  install:
    {{- if .createNamespace }}
    createNamespace: true
    {{- end }}
    {{- if (.options).install }}
    timeout: {{ .options.install.timeout | default "10m" }}
    {{- end }}
    remediation:
      retries: -1
      remediateLastFailure: false
  upgrade:
    {{- if (.options).upgrade }}
    timeout: {{ .options.upgrade.timeout | default "10m" }}
    {{- end }}
    remediation:
      retries: -1
      remediateLastFailure: false
      {{- if (.options).upgrade }}
      {{- if (.options.upgrade).remediationStrategy }}
      strategy: {{ .options.upgrade.remediationStrategy }}
      {{- end }}
      {{- end }}
  {{- /* extraConfigs carry the App platform `priority` (1-150, default 25): entries with
         priority <= 100 merge before user config and entries above 100 after it, regardless
         of their position in the list. Flux merges valuesFrom strictly in list order, so
         emit the entries stably sorted by priority, split around the user config references. */}}
  {{- $extraConfigs := .extraConfigs | default list }}
  {{- $extraConfigsBeforeUser := list }}
  {{- $extraConfigsAfterUser := list }}
  {{- range $priority := untilStep 1 151 1 }}
  {{- range $extraConfig := $extraConfigs }}
  {{- if eq (int ($extraConfig.priority | default 25)) $priority }}
  {{- if le $priority 100 }}
  {{- $extraConfigsBeforeUser = append $extraConfigsBeforeUser $extraConfig }}
  {{- else }}
  {{- $extraConfigsAfterUser = append $extraConfigsAfterUser $extraConfig }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- $hasExtraConfigs := gt (len $extraConfigs) 0 }}
  {{- $hasUserConfigMap := false }}
  {{- $hasUserSecret := false }}
  {{- if $.Values.userConfig }}
  {{- with (get $.Values.userConfig $key) }}
  {{- if .configMap }}{{ $hasUserConfigMap = true }}{{ end }}
  {{- if .secret }}{{ $hasUserSecret = true }}{{ end }}
  {{- end }}
  {{- end }}
  {{- if or $hasExtraConfigs $hasUserConfigMap $hasUserSecret }}
  valuesFrom:
  {{- range $extraConfig := $extraConfigsBeforeUser }}
  {{- $kind := $extraConfig.kind }}
  {{- if eq $kind "configMap" }}{{ $kind = "ConfigMap" }}{{ else if eq $kind "secret" }}{{ $kind = "Secret" }}{{ end }}
  - kind: {{ $kind }}
    name: {{ tpl $extraConfig.name $ }}
    valuesKey: values
    optional: false
  {{- end }}
  {{- if $hasUserConfigMap }}
  - kind: ConfigMap
    name: {{ $appName }}-user-values
    valuesKey: values
    optional: false
  {{- end }}
  {{- if $hasUserSecret }}
  - kind: Secret
    name: {{ $appName }}-user-secrets
    valuesKey: values
    optional: false
  {{- end }}
  {{- range $extraConfig := $extraConfigsAfterUser }}
  {{- $kind := $extraConfig.kind }}
  {{- if eq $kind "configMap" }}{{ $kind = "ConfigMap" }}{{ else if eq $kind "secret" }}{{ $kind = "Secret" }}{{ end }}
  - kind: {{ $kind }}
    name: {{ tpl $extraConfig.name $ }}
    valuesKey: values
    optional: false
  {{- end }}
  {{- end }}
{{- end }}

{{- if $.Values.userConfig }}
{{- with (get $.Values.userConfig $key) }}
{{- if ((.configMap).values) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}-user-values
  namespace: {{ $.Release.Namespace }}
data:
  values: |
  {{- (tpl (.configMap.values | toYaml | toString) $) | nindent 4 }}
{{- end }}
{{- if ((.secret).values) }}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}-user-secrets
  namespace: {{ $.Release.Namespace }}
stringData:
  values: |
  {{- (tpl (.secret.values | toYaml | toString) $) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end -}}
