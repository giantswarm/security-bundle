{{- range $key, $value := .Values.apps }}
{{- $appName := include "app.name" (dict "app" .appName "cluster" $.Values.clusterID "ns" $.Release.Namespace) }}
{{- if .enabled }}
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}
  namespace: {{ $.Release.Namespace }}
spec:
  url: oci://gsoci.azurecr.io/charts/giantswarm/{{ .chartName }}
  ref:
    tag: "{{ .version }}"
  interval: 24h
  timeout: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}
  namespace: {{ $.Release.Namespace }}
spec:
  releaseName: {{ .appName }}
  {{- $appNamespace := required "A valid .Values.global.namespace or .Values.apps.{APP_NAME}.namespace entry is required" (default ($.Values.global).namespace .namespace) }}
  targetNamespace: {{ $appNamespace }}
  storageNamespace: {{ $appNamespace }}
  chartRef:
    kind: OCIRepository
    name: {{ $appName }}
  {{- if .dependsOn }}
  dependsOn:
  {{- range $_, $dependency := .dependsOn }}
  - name: {{ $.Values.clusterID }}-{{ $dependency }}
    namespace: {{ $.Release.Namespace }}
  {{- end }}
  {{- end }}
  kubeConfig:
    secretRef:
      name: {{ $.Values.clusterID }}-kubeconfig
  interval: 5m
  install:
    {{- if .createNamespace }}
    createNamespace: true
    {{- end }}
    {{- if (.options).install }}
    timeout: {{ .options.install.timeout | default "10m" }}
    {{- end }}
    remediation:
      retries: -1
      remediateLastFailure: false
  upgrade:
    {{- if (.options).upgrade }}
    timeout: {{ .options.upgrade.timeout | default "10m" }}
    {{- end }}
    remediation:
      retries: -1
      remediateLastFailure: false
      {{- if (.options).upgrade }}
      {{- if (.options.upgrade).remediationStrategy }}
      strategy: {{ .options.upgrade.remediationStrategy }}
      {{- end }}
      {{- end }}
  {{- /* extraConfigs carry the App platform `priority` (1-150, default 25). App platform
         merges all configMaps then all secrets (secret always overrides configMap), ordering
         each kind by priority around the user-config slot (100). Flux merges valuesFrom in
         list order, so emit a single list sorted to reproduce that — see the
         `sortedValuesFrom` helper. */}}
  {{- $extraConfigs := .extraConfigs | default list }}
  {{- $userConfigMapName := "" }}
  {{- $userSecretName := "" }}
  {{- if $.Values.userConfig }}
  {{- with (get $.Values.userConfig $key) }}
  {{- if .configMap }}{{ $userConfigMapName = printf "%s-user-values" $appName }}{{ end }}
  {{- if .secret }}{{ $userSecretName = printf "%s-user-secrets" $appName }}{{ end }}
  {{- end }}
  {{- end }}
  {{- $sorted := include "sortedValuesFrom" (dict "extraConfigs" $extraConfigs "userConfigMapName" $userConfigMapName "userSecretName" $userSecretName "root" $) | fromYamlArray }}
  {{- if $sorted }}
  valuesFrom:
  {{- range $entry := $sorted }}
  - kind: {{ $entry.kind }}
    name: {{ $entry.name }}
    valuesKey: values
    optional: false
  {{- end }}
  {{- end }}
{{- end }}

{{- if $.Values.userConfig }}
{{- with (get $.Values.userConfig $key) }}
{{- if ((.configMap).values) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}-user-values
  namespace: {{ $.Release.Namespace }}
data:
  values: |
  {{- (tpl (.configMap.values | toYaml | toString) $) | nindent 4 }}
{{- end }}
{{- if ((.secret).values) }}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $appName }}-user-secrets
  namespace: {{ $.Release.Namespace }}
stringData:
  values: |
  {{- (tpl (.secret.values | toYaml | toString) $) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end -}}
